# RL Flow Control — PPO Hyperparameters

environment:
  data_dir:        "./data/cfd"
  n_stations:      5
  profile_points:  20
  max_steps:       200
  actuator_penalty: 0.01
  noise_std:       0.001

agent:
  lr_actor:     0.0003
  lr_critic:    0.001
  gamma:        0.99
  gae_lambda:   0.95
  clip_eps:     0.2
  n_epochs:     10
  batch_size:   64
  ent_coef:     0.01
  vf_coef:      0.5
  max_grad_norm: 0.5

training:
  episodes:       2000
  rollout_steps:  400
  log_every:      50
  seed:           42

output:
  checkpoint_dir: "./checkpoints"
  results_dir:    "./results"
